apiVersion: v1
kind: Namespace
metadata:
  name: flame
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flame
  namespace: flame
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flame
  template:
    metadata:
      labels:
        app: flame
    spec:
      containers:
      - name: flame
        image: docker.io/pawelmalak/flame:latest
        env:
        - name: PASSWORD
          value: "admin"
        ports:
        - containerPort: 5005
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: flame
  namespace: flame
spec:
  type: NodePort
  selector:
    app: flame
  ports:
  - port: 5005
    targetPort: 5005
    nodePort: 30080
