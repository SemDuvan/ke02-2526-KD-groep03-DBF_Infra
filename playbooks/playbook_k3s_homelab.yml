---
- name: Homelab Stack op k3s
  hosts: localhost
  connection: local
  become: false
  vars:
    kubeconfig: "{{ ansible_env.HOME }}/.kube/config"
    pi_ip: "{{ ansible_host | default('localhost') }}"
    webserver_0_ip: "Nog niet gedeployed"
    webserver_1_ip: "Nog niet gedeployed"

  pre_tasks:
    - name: Controleren of Kubeconfig bestaat
      stat:
        path: "{{ kubeconfig }}"
      register: kube_file

    - name: Controleren of Helm geinstalleerd is
      command: helm version
      changed_when: false
      register: helm_check
      failed_when: helm_check.rc != 0
      when: kube_file.stat.exists

    - name: Controleren of K3s bereikbaar is
      command: "kubectl --kubeconfig {{ kubeconfig }} get nodes"
      changed_when: false
      when: kube_file.stat.exists

  tasks:

    # ============================================================
    # SECTIE 1: HELM REPOSITORIES
    # ============================================================
    - name: Helm repositories toevoegen
      shell: |
        helm repo add portainer https://portainer.github.io/k8s/
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo add grafana https://grafana.github.io/helm-charts
        helm repo add bjw-s https://bjw-s.github.io/helm-charts/
        helm repo update
      ignore_errors: false
    # ============================================================

    # ============================================================
    # SECTIE 2: NAMESPACES
    # ============================================================
    - name: Namespaces aanmaken
      shell: |
        kubectl --kubeconfig {{ kubeconfig }} create namespace portainer --dry-run=client -o yaml | kubectl --kubeconfig {{ kubeconfig }} apply -f -
        kubectl --kubeconfig {{ kubeconfig }} create namespace monitoring --dry-run=client -o yaml | kubectl --kubeconfig {{ kubeconfig }} apply -f -
        kubectl --kubeconfig {{ kubeconfig }} create namespace uptime-kuma --dry-run=client -o yaml | kubectl --kubeconfig {{ kubeconfig }} apply -f -
        kubectl --kubeconfig {{ kubeconfig }} create namespace homer --dry-run=client -o yaml | kubectl --kubeconfig {{ kubeconfig }} apply -f -

    # ============================================================
    # SECTIE 3: APPLICATIES INSTALLEREN
    # ============================================================

    - name: Portainer installeren
      shell: |
        helm --kubeconfig {{ kubeconfig }} upgrade --install portainer portainer/portainer \
          --namespace portainer \
          --set service.type=NodePort \
          --set service.nodePort=30777 \
          --set tls.force=false

    - name: Prometheus installeren
      shell: |
        helm --kubeconfig {{ kubeconfig }} upgrade --install prometheus prometheus-community/prometheus \
          --namespace monitoring \
          --set server.service.type=NodePort \
          --set server.service.nodePort=30090 \
          --set server.resources.requests.memory=128Mi \
          --set server.resources.limits.memory=256Mi \
          --set alertmanager.enabled=false \
          --set pushgateway.enabled=false \
          --set kube-state-metrics.enabled=false

    - name: Grafana installeren
      shell: |
        helm --kubeconfig {{ kubeconfig }} upgrade --install grafana grafana/grafana \
          --namespace monitoring \
          --set service.type=NodePort \
          --set service.nodePort=30030 \
          --set resources.requests.memory=64Mi \
          --set resources.limits.memory=128Mi \
          --set adminPassword=admin

    - name: Uptime Kuma installeren (met bjw-s app-template)
      shell: |
        helm --kubeconfig {{ kubeconfig }} upgrade --install uptime-kuma bjw-s/app-template \
          --namespace uptime-kuma \
          --set controllers.main.containers.main.image.repository=louislam/uptime-kuma \
          --set controllers.main.containers.main.image.tag=latest \
          --set service.main.ports.http.port=3001 \
          --set service.main.ports.http.nodePort=30031 \
          --set service.main.type=NodePort \
          --set persistence.config.enabled=true \
          --set persistence.config.type=persistentVolumeClaim \
          --set persistence.config.size=1Gi \
          --set persistence.config.accessMode=ReadWriteOnce

    - name: Homer ConfigMap genereren en aanmaken
      template:
        src: "{{ playbook_dir }}/../manifests/homer-config.yml.j2"
        dest: "/tmp/homer-config-rendered.yml"
      become: false
      tags: [homer, dashboard]

    - name: Homer ConfigMap toepassen op k3s
      shell: "kubectl --kubeconfig {{ kubeconfig }} apply -f /tmp/homer-config-rendered.yml"
      tags: [homer, dashboard]

    - name: Homer deployen
      shell: "kubectl --kubeconfig {{ kubeconfig }} apply -f {{ playbook_dir }}/../manifests/homer.yml"
      tags: [homer, dashboard]

    # ============================================================
    # SECTIE 4: STATUS & VERIFICATIE
    # ============================================================
    - name: Overzicht van alle pods
      shell: "kubectl --kubeconfig {{ kubeconfig }} get pods -A"
      register: pods_output

    - name: Toon pods
      debug:
        msg: "{{ pods_output.stdout }}"
