---
- name: Homelab Stack op k3s
  hosts: localhost
  connection: local
  become: false
  vars:
    kubeconfig: /home/pi/.kube/config

  tasks:

    - name: Portainer Helm repo toevoegen
      shell: helm repo add portainer https://portainer.github.io/k8s/ && helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      ignore_errors: true

    - name: Portainer installeren
      shell: |
        helm upgrade --install portainer portainer/portainer \
          --namespace portainer \
          --create-namespace \
          --set service.type=NodePort \
          --set service.nodePort=30777 \
          --set tls.force=false
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Prometheus Helm repo toevoegen
      shell: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts && helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      ignore_errors: true

    - name: Grafana Helm repo toevoegen
      shell: helm repo add grafana https://grafana.github.io/helm-charts && helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      ignore_errors: true

    - name: Bjw-s Helm repo toevoegen
      shell: helm repo add bjw-s https://bjw-s.github.io/helm-charts/ && helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      ignore_errors: true

    - name: Monitoring namespace aanmaken
      shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Prometheus installeren
      shell: |
        helm upgrade --install prometheus prometheus-community/prometheus \
          --namespace monitoring \
          --set server.service.type=NodePort \
          --set server.service.nodePort=30090 \
          --set server.resources.requests.memory=128Mi \
          --set server.resources.limits.memory=256Mi \
          --set alertmanager.enabled=false \
          --set pushgateway.enabled=false \
          --set kube-state-metrics.enabled=false
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Grafana installeren
      shell: |
        helm upgrade --install grafana grafana/grafana \
          --namespace monitoring \
          --set service.type=NodePort \
          --set service.nodePort=30030 \
          --set resources.requests.memory=64Mi \
          --set resources.limits.memory=128Mi \
          --set adminPassword=admin
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Uptime Kuma installeren (met bjw-s app-template)
      shell: |
        helm upgrade --install uptime-kuma bjw-s/app-template \
          --namespace uptime-kuma \
          --create-namespace \
          --set controllers.main.containers.main.image.repository=louislam/uptime-kuma \
          --set controllers.main.containers.main.image.tag=latest \
          --set service.main.ports.http.port=3001 \
          --set service.main.ports.http.nodePort=30031 \
          --set service.main.type=NodePort \
          --set persistence.config.enabled=false
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Homer ConfigMap aanmaken
      shell: kubectl apply -f ~/homelab/manifests/homer-config.yml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Homer deployen
      shell: kubectl apply -f ~/homelab/manifests/homer.yml
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Overzicht van alle pods
      shell: kubectl get pods -A
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: pods_output

    - name: Toon pods
      debug:
        msg: "{{ pods_output.stdout }}"
